version: '3.9'

# =============================================================================
# School Management SaaS — Docker Compose
#
# Quick start:
#   cp .env.example .env    # fill in secrets
#   make ssl-cert           # generate self-signed cert for local HTTPS
#   docker compose up -d
#
# Production deploy:
#   docker compose up -d --build
# =============================================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: school_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-school_management}
      POSTGRES_USER:     ${DB_USER:-school_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"   # loopback-only — not exposed publicly
    healthcheck:
      test:         ["CMD-SHELL", "pg_isready -U ${DB_USER:-school_admin} -d ${DB_NAME:-school_management}"]
      interval:     10s
      timeout:       5s
      retries:       5
      start_period: 20s
    networks:
      - school_net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: school_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"  # loopback-only
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:   5s
      retries:   5
    networks:
      - school_net

  # ── Backend API ────────────────────────────────────────────────────────────
  api:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     production
    container_name: school_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run DB migrations before starting the server (idempotent — safe every time)
    command: sh -c "node dist/database/migrate.js && node dist/index.js"
    environment:
      NODE_ENV:    production
      PORT:        3000
      # Database
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-school_management}
      DB_USER:     ${DB_USER:-school_admin}
      DB_PASSWORD: ${DB_PASSWORD}
      # Auth
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-7d}
      SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET}
      # CORS — comma-separated origins (e.g. https://school.com,https://www.school.com)
      CORS_ORIGIN: ${CORS_ORIGIN:-https://localhost}
      # Redis
      REDIS_ENABLED:    "true"
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      REDIS_PASSWORD:   ${REDIS_PASSWORD}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      # Email
      SMTP_HOST:   ${SMTP_HOST}
      SMTP_PORT:   ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER:   ${SMTP_USER}
      SMTP_PASS:   ${SMTP_PASS}
      SMTP_FROM:   ${SMTP_FROM}
      # App
      APP_URL:  ${APP_URL:-https://localhost}
      APP_NAME: ${APP_NAME:-School Management}
      # File uploads
      UPLOAD_DIR:    /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      # Integrations (all optional)
      SENTRY_DSN:              ${SENTRY_DSN}
      ANTHROPIC_API_KEY:       ${ANTHROPIC_API_KEY}
      RAZORPAY_KEY_ID:         ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET:     ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      STRIPE_SECRET_KEY:       ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:   ${STRIPE_WEBHOOK_SECRET}
    volumes:
      - uploads:/app/uploads
      - api_logs:/app/logs
    expose:
      - "3000"     # internal only — nginx proxies from public ports
    networks:
      - school_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file:  "5"

  # ── Nginx: serves Angular SPA + proxies API ────────────────────────────────
  nginx:
    build:
      context:    .
      dockerfile: nginx/Dockerfile
    container_name: school_nginx
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - nginx_logs:/var/log/nginx
      - nginx_ssl:/etc/nginx/ssl         # mount real certs here in production
      - certbot_www:/var/www/certbot     # for Let's Encrypt ACME challenges
    ports:
      - "80:80"
      - "443:443"
    networks:
      - school_net

  # ── Background notification worker ────────────────────────────────────────
  worker:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     production
    container_name: school_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: node dist/workers/notificationWorker.js
    environment:
      NODE_ENV:    production
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-school_management}
      DB_USER:     ${DB_USER:-school_admin}
      DB_PASSWORD: ${DB_PASSWORD}
      SMTP_HOST:   ${SMTP_HOST}
      SMTP_PORT:   ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER:   ${SMTP_USER}
      SMTP_PASS:   ${SMTP_PASS}
      SMTP_FROM:   ${SMTP_FROM}
    networks:
      - school_net

volumes:
  postgres_data:
  redis_data:
  uploads:
  api_logs:
  nginx_logs:
  nginx_ssl:
  certbot_www:

networks:
  school_net:
    driver: bridge
