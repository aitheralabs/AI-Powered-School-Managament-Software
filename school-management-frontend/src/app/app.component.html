<div class="app-container">
  <!-- Loading Spinner Overlay -->
  <app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

  <!-- ① Public / no-shell routes: landing, auth, super-admin, unauthorized -->
  <div *ngIf="isPublicRoute()" class="public-route-container">
    <router-outlet></router-outlet>
  </div>

  <!-- ② Authenticated shell: header + sidebar + content -->
  <mat-sidenav-container *ngIf="!isPublicRoute() && isAuthenticated" class="main-container">
    <!-- Sidebar -->
    <mat-sidenav
      #sidenav
      [mode]="isMobile() ? 'over' : 'side'"
      [opened]="sidenavOpened"
      class="app-sidenav"
    >
      <app-sidebar (closeSidenav)="closeSidenav()"></app-sidebar>
    </mat-sidenav>

    <!-- Main Content -->
    <mat-sidenav-content class="main-content">
      <app-header (toggleSidenav)="toggleSidenav()"></app-header>
      <div class="content-wrapper">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>

  <!-- ③ Fallback: protected route visited while unauthenticated.
       AuthGuard will redirect to /auth/login; we still need an outlet
       mounted so the router can perform the redirect. -->
  <div *ngIf="!isPublicRoute() && !isAuthenticated" class="public-route-container">
    <router-outlet></router-outlet>
  </div>
</div>
