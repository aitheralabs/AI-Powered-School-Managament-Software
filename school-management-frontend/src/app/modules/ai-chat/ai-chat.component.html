<div class="ai-chat-page">
  <!-- Header -->
  <div class="page-header">
    <div class="page-header-left">
      <div class="ai-avatar">
        <mat-icon>smart_toy</mat-icon>
      </div>
      <div>
        <h1 class="page-title">AI Assistant</h1>
        <p class="page-subtitle">Powered by Claude · Ask anything about your school</p>
      </div>
    </div>
    <button mat-icon-button matTooltip="Clear chat" (click)="clearChat()">
      <mat-icon>refresh</mat-icon>
    </button>
  </div>

  <!-- Messages -->
  <div class="messages-wrapper">
    <div class="messages-container" #messagesContainer>
      <div
        *ngFor="let msg of messages"
        class="message"
        [class.user]="msg.role === 'user'"
        [class.assistant]="msg.role === 'assistant'"
      >
        <div class="message-avatar" *ngIf="msg.role === 'assistant'">
          <mat-icon>smart_toy</mat-icon>
        </div>
        <div class="message-bubble">
          <p class="message-content">{{ msg.content }}</p>
          <span class="message-time">{{ msg.timestamp | date:'shortTime' }}</span>
        </div>
      </div>

      <!-- Loading indicator -->
      <div class="message assistant" *ngIf="isLoading">
        <div class="message-avatar">
          <mat-icon>smart_toy</mat-icon>
        </div>
        <div class="message-bubble typing">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Suggested questions (only when just greeting) -->
  <div class="suggestions" *ngIf="messages.length === 1">
    <p class="suggestions-label">Try asking:</p>
    <div class="suggestions-grid">
      <button
        *ngFor="let q of suggestedQuestions"
        class="suggestion-chip"
        (click)="sendMessage(q)"
      >{{ q }}</button>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      class="input-field"
      [(ngModel)]="inputText"
      (keydown)="onKeyDown($event)"
      placeholder="Ask about attendance, grades, fees, students…"
      rows="1"
      [disabled]="isLoading"
    ></textarea>
    <button
      class="send-btn"
      (click)="sendMessage()"
      [disabled]="!inputText.trim() || isLoading"
    >
      <mat-icon>send</mat-icon>
    </button>
  </div>
</div>
