<div class="auth-page">
  <div class="auth-card">
    <div class="form-header">
      <div class="form-icon-wrap">
        <mat-icon>lock_reset</mat-icon>
      </div>
      <h2>Reset Password</h2>
      <p>Enter your new password below</p>
    </div>

    <div *ngIf="resetSuccess" class="success-box">
      <mat-icon>check_circle</mat-icon>
      <p>Your password has been reset successfully. You can now sign in with your new password.</p>
      <a routerLink="/auth/login" class="back-link">Go to Login</a>
    </div>

    <form *ngIf="!resetSuccess" [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="field-group">
        <label for="newPassword">New Password</label>
        <div class="input-wrap" [class.error]="newPassword?.invalid && newPassword?.touched">
          <mat-icon>lock</mat-icon>
          <input
            id="newPassword"
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="newPassword"
            placeholder="Enter new password"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-vis" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <p class="field-error" *ngIf="newPassword?.hasError('required') && newPassword?.touched">Password is required</p>
        <p class="field-error" *ngIf="newPassword?.hasError('minlength') && newPassword?.touched">Minimum 8 characters</p>
      </div>

      <div class="field-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrap" [class.error]="confirmPassword?.invalid && confirmPassword?.touched">
          <mat-icon>lock_outline</mat-icon>
          <input
            id="confirmPassword"
            [type]="hideConfirm ? 'password' : 'text'"
            formControlName="confirmPassword"
            placeholder="Confirm new password"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-vis" (click)="hideConfirm = !hideConfirm">
            <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <p class="field-error" *ngIf="confirmPassword?.hasError('required') && confirmPassword?.touched">Confirmation is required</p>
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading" [class.loading]="isLoading">
        <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
        <span>{{ isLoading ? 'Resetting…' : 'Reset Password' }}</span>
      </button>
    </form>
  </div>
</div>
