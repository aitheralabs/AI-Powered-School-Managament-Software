<div class="subjects-page fade-in">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Subjects</h1>
      <p class="page-subtitle">Manage all subjects offered by the school</p>
    </div>
    <button mat-raised-button color="primary" *ngIf="isAdmin" (click)="openForm()">
      <mat-icon>add</mat-icon>
      Add Subject
    </button>
  </div>

  <!-- Search + Table -->
  <div class="content-card">
    <div class="card-header">
      <h2>Subject List</h2>
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search</mat-label>
        <input matInput [(ngModel)]="search" (ngModelChange)="onSearch()" placeholder="Name or code…" />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </div>

    <div *ngIf="loading" class="loading-center"><mat-spinner diameter="36"></mat-spinner></div>

    <table mat-table [dataSource]="subjects" *ngIf="!loading" class="data-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let s">{{ s.name }}</td>
      </ng-container>
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Code</th>
        <td mat-cell *matCellDef="let s"><span class="code-badge">{{ s.code }}</span></td>
      </ng-container>
      <ng-container matColumnDef="creditHours">
        <th mat-header-cell *matHeaderCellDef>Credit Hours</th>
        <td mat-cell *matCellDef="let s">{{ s.creditHours }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let s">
          <span class="chip" [ngClass]="s.isActive ? 'chip-success' : 'chip-neutral'">
            {{ s.isActive ? 'Active' : 'Inactive' }}
          </span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let s">
          <button mat-icon-button matTooltip="Edit" *ngIf="isAdmin" (click)="openForm(s)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Delete" *ngIf="isAdmin" (click)="deleteSubject(s)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns;"></tr>
    </table>

    <p class="empty-state" *ngIf="!loading && subjects.length === 0">
      No subjects found. {{ isAdmin ? 'Click "Add Subject" to create one.' : '' }}
    </p>

    <mat-paginator [length]="total" [pageSize]="pageSize" [pageSizeOptions]="[10,20,50]"
                   (page)="onPageChange($event)">
    </mat-paginator>
  </div>
</div>
